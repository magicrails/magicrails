name: New framework adapter
description: Request (or claim) an adapter for a framework Magicrails doesn't support yet.
labels: ["adapter"]
body:
  - type: input
    id: framework
    attributes:
      label: Framework
      placeholder: "LangChain / LangGraph / CrewAI / AutoGen / LiteLLM / ..."
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Link to the framework's docs / SDK
      placeholder: "https://..."
    validations:
      required: true

  - type: textarea
    id: hook-point
    attributes:
      label: Where would the adapter hook in?
      description: Which method, callback, or event exposes (model, input_tokens, output_tokens) and/or tool calls?
      placeholder: |
        e.g. LangChain `BaseCallbackHandler.on_llm_end` exposes `LLMResult.llm_output["token_usage"]`
    validations:
      required: true

  - type: checkboxes
    id: claim
    attributes:
      label: Are you offering to write it?
      options:
        - label: Yes, I'd like to send a PR
        - label: No, just requesting
